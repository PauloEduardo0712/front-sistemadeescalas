<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Escalas - Shekinah IAD</title>
  <link rel="icon" href="img/logo-shekinah.svg" type="image/svg+xml">
  <script>
    (function () {
      const temaSalvo = localStorage.getItem("shekinah-theme");
      document.documentElement.setAttribute("data-theme", temaSalvo === "dark" ? "dark" : "light");
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
